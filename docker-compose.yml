services:
  postgres:
    image: postgres:16-alpine
    container_name: gst-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ticketing
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ticketing"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrator:
    image: go-service-template:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gst-migrator
    profiles: ["app"]
    command: ["/migrate"]
    restart: "no"
    environment:
      SERVICE_NAME: ticketing-template
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/ticketing?sslmode=disable
      MIGRATIONS_DIR: /migrations
    depends_on:
      postgres:
        condition: service_healthy

  app:
    image: go-service-template:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gst-app
    profiles: ["app"]
    environment:
      SERVICE_NAME: ticketing-template
      HTTP_ADDR: :8080
      GRPC_ADDR: :9090
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/ticketing?sslmode=disable
      MIGRATIONS_DIR: /migrations
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
    ports:
      - "8080:8080"
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.1
    container_name: gst-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./deploy/observability/otel/collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"
      - "${OTEL_HTTP_PORT:-4318}:4318"
      - "${OTEL_PROM_PORT:-8889}:8889"
    depends_on:
      jaeger:
        condition: service_started

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: gst-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"

  prometheus:
    image: prom/prometheus:v2.53.3
    container_name: gst-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./deploy/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9091}:9090"
    depends_on:
      otel-collector:
        condition: service_started

  grafana:
    image: grafana/grafana:11.1.4
    container_name: gst-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./deploy/observability/grafana/provisioning/datasources/prometheus.yaml:/etc/grafana/provisioning/datasources/prometheus.yaml:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      prometheus:
        condition: service_started

volumes:
  postgres_data:
  grafana_data:
