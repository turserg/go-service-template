syntax = "proto3";

package booking.v1;

option go_package = "github.com/turserg/go-service-template/gen/go/booking/v1;bookingv1";

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

service BookingService {
  rpc ReserveSeats(ReserveSeatsRequest) returns (ReserveSeatsResponse) {
    option (google.api.http) = {
      post: "/v1/booking/reservations"
      body: "*"
    };
  }

  rpc CheckoutOrder(CheckoutOrderRequest) returns (CheckoutOrderResponse) {
    option (google.api.http) = {
      post: "/v1/booking/orders:checkout"
      body: "*"
    };
  }

  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse) {
    option (google.api.http) = {
      post: "/v1/booking/orders/{order_id}:cancel"
      body: "*"
    };
  }
}

message ReserveSeatsRequest {
  string event_id = 1;
  string user_id = 2;
  repeated string seat_ids = 3;
  string idempotency_key = 4;
}

message ReserveSeatsResponse {
  string reservation_id = 1;
  string status = 2;
  google.protobuf.Timestamp expires_at = 3;
  int64 total_amount_minor = 4;
  string currency = 5;
}

message CheckoutOrderRequest {
  string reservation_id = 1;
  string payment_method_token = 2;
  string idempotency_key = 3;
}

message CheckoutOrderResponse {
  string order_id = 1;
  string status = 2;
  string payment_transaction_id = 3;
}

message CancelOrderRequest {
  string order_id = 1;
  string user_id = 2;
  string reason = 3;
  string idempotency_key = 4;
}

message CancelOrderResponse {
  string order_id = 1;
  string status = 2;
  uint32 released_seat_count = 3;
}
